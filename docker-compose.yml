services:
  backend:
    build:
      context: ./backend
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/andromeda.db}
      BUSINESS_TODAY: ${BUSINESS_TODAY:-2025-01-15}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      AGENT_MODE: ${AGENT_MODE:-graph}
      TOOL_MODE: ${TOOL_MODE:-local}
      RAG_ENABLED: ${RAG_ENABLED:-false}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - backend-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 8

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend-data:
