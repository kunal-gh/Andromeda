name: Sync Backend to Hugging Face Space

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/hf-deploy.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          # 1. Setup git configuration
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # 2. Clone the Hugging Face Space repository into a temp directory
          git clone https://user:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME hf_space
          
          # 3. Copy the backend files to the root of the Space
          # (HF Spaces requires the Dockerfile to be at the root)
          rsync -a --delete --exclude='.git' backend/ hf_space/
          
          # 4. Create the Hugging Face config block in the Space's README.md
          cat <<EOF > hf_space/README.md
          ---
          title: Andromeda AI Backend
          sdk: docker
          app_port: 8000
          ---
          
          # Andromeda Backend (Auto-synced from GitHub)
          This space runs the FastAPI + LangGraph backend for Andromeda.
          EOF
          
          # 5. Commit and push to Hugging Face
          cd hf_space
          git add .
          git commit -m "Sync backend from GitHub commit ${{ github.sha }}" || echo "No changes to commit"
          git push origin main
