<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 650" width="100%" height="100%" style="background-color: #0f172a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <!-- Arrowhead definitions -->
    <marker id="arrow-orders" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2dd4bf" />
    </marker>
    <marker id="arrow-conv" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4ade80" />
    </marker>
    <marker id="arrow-trace" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8" />
    </marker>
    <marker id="arrow-trace2" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f87171" />
    </marker>
  </defs>

  <!-- Title/Note at the bottom -->
  <text x="550" y="620" fill="#9ca3af" font-size="16" text-anchor="middle">Seeded edge cases: final sale, old order, &gt; $500, digital goods, already refunded, pending, condition review, email mismatch.</text>

  <!-- Arrows -->
  <line x1="300" y1="170" x2="380" y2="170" stroke="#2dd4bf" stroke-width="3" marker-end="url(#arrow-orders)" />
  <line x1="660" y1="170" x2="740" y2="170" stroke="#4ade80" stroke-width="3" marker-end="url(#arrow-conv)" />
  <line x1="875" y1="280" x2="875" y2="340" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow-trace)" />
  <line x1="660" y1="450" x2="740" y2="450" stroke="#f87171" stroke-width="3" marker-end="url(#arrow-trace2)" />

  <!-- Customers Box -->
  <rect x="50" y="50" width="250" height="230" rx="12" fill="#0f272a" stroke="#2dd4bf" stroke-width="2" />
  <text x="70" y="85" fill="#ccfbf1" font-size="22" font-weight="bold">customers</text>
  <text x="70" y="125" fill="#ccfbf1" font-size="16">id PK</text>
  <text x="70" y="155" fill="#ccfbf1" font-size="16">name</text>
  <text x="70" y="185" fill="#ccfbf1" font-size="16">email unique</text>
  <text x="70" y="215" fill="#ccfbf1" font-size="16">loyalty_tier</text>
  <text x="70" y="245" fill="#ccfbf1" font-size="16">fraud_risk</text>

  <!-- Orders Box -->
  <rect x="410" y="50" width="250" height="260" rx="12" fill="#064e3b" stroke="#4ade80" stroke-width="2" />
  <text x="430" y="85" fill="#dcfce7" font-size="22" font-weight="bold">orders</text>
  <text x="430" y="125" fill="#dcfce7" font-size="16">id PK</text>
  <text x="430" y="155" fill="#dcfce7" font-size="16">customer_id FK</text>
  <text x="430" y="185" fill="#dcfce7" font-size="16">price</text>
  <text x="430" y="215" fill="#dcfce7" font-size="16">delivery_date</text>
  <text x="430" y="245" fill="#dcfce7" font-size="16">final_sale</text>
  <text x="430" y="275" fill="#dcfce7" font-size="16">returned</text>

  <!-- Conversations Box -->
  <rect x="750" y="50" width="250" height="230" rx="12" fill="#082f49" stroke="#38bdf8" stroke-width="2" />
  <text x="770" y="85" fill="#e0f2fe" font-size="22" font-weight="bold">conversations</text>
  <text x="770" y="125" fill="#e0f2fe" font-size="16">id PK</text>
  <text x="770" y="155" fill="#e0f2fe" font-size="16">customer_email</text>
  <text x="770" y="185" fill="#e0f2fe" font-size="16">status</text>
  <text x="770" y="215" fill="#e0f2fe" font-size="16">latest_message</text>

  <!-- Refund Requests Box -->
  <rect x="410" y="350" width="250" height="200" rx="12" fill="#450a0a" stroke="#f87171" stroke-width="2" />
  <text x="430" y="385" fill="#fee2e2" font-size="22" font-weight="bold">refund_requests</text>
  <text x="430" y="425" fill="#fee2e2" font-size="16">conversation_id FK</text>
  <text x="430" y="455" fill="#fee2e2" font-size="16">order_id</text>
  <text x="430" y="485" fill="#fee2e2" font-size="16">decision</text>
  <text x="430" y="515" fill="#fee2e2" font-size="16">reason</text>

  <!-- Trace Events Box -->
  <rect x="750" y="350" width="250" height="230" rx="12" fill="#422006" stroke="#facc15" stroke-width="2" />
  <text x="770" y="385" fill="#fef08a" font-size="22" font-weight="bold">trace_events</text>
  <text x="770" y="425" fill="#fef08a" font-size="16">conversation_id FK</text>
  <text x="770" y="455" fill="#fef08a" font-size="16">step</text>
  <text x="770" y="485" fill="#fef08a" font-size="16">title</text>
  <text x="770" y="515" fill="#fef08a" font-size="16">detail JSON</text>
  <text x="770" y="545" fill="#fef08a" font-size="16">severity</text>

</svg>
